name: Publish to NPM

on:
  push:
    branches:
      - main

# Cancel any in-progress run on the same branch if a newer push arrives.
concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: true

# Shared setup used by all three jobs.
env:
  NODE_VERSION: "24"
  REGISTRY_URL: https://registry.npmjs.org/

jobs:
  # 1. Lint 
  # Run linting before doing anything else. If this fails, nothing publishes.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    environment: Staging Environment
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: ${{ env.REGISTRY_URL }}

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run lint

  # 2. Detect
  # Compare package.json, git tags, GitHub releases, and npm to determine
  # exactly where the last run failed so the publish job can resume from there.
  #
  # Publish order:
  #   bump → tag → release → npm
  #
  # If all four are in sync, outputs step=none and the publish job is skipped.
  detect:
    name: Detect resume step
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      step: ${{ steps.detect.outputs.step }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: ${{ env.REGISTRY_URL }}

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Detect resume step
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          GIT_VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "")
          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          GH_RELEASE=$(gh release view "v$PKG_VERSION" --json tagName -q '.tagName' 2>/dev/null || echo "")

          echo "package.json : $PKG_VERSION"
          echo "git tag      : $GIT_VERSION"
          echo "gh release   : $GH_RELEASE"
          echo "npm latest   : $NPM_VERSION"

          # All four in sync → nothing to do
          if [ "$PKG_VERSION" = "$NPM_VERSION" ] && \
             [ "$GIT_VERSION" = "$PKG_VERSION" ] && \
             [ "$GH_RELEASE"  = "v$PKG_VERSION" ]; then
            echo "step=none" >> "$GITHUB_OUTPUT"

          # git tag + release exist, npm missing → resume from npm
          elif [ "$GIT_VERSION" = "$PKG_VERSION" ] && \
               [ "$GH_RELEASE"  = "v$PKG_VERSION" ] && \
               [ "$NPM_VERSION" != "$PKG_VERSION" ]; then
            echo "step=npm" >> "$GITHUB_OUTPUT"

          # git tag exists, release missing, npm missing → resume from release
          elif [ "$GIT_VERSION" = "$PKG_VERSION" ] && [ -z "$GH_RELEASE" ]; then
            echo "step=release" >> "$GITHUB_OUTPUT"

          # package.json bumped, git tag missing → resume from tag
          elif [ "$GIT_VERSION" != "$PKG_VERSION" ] && \
               [ "$NPM_VERSION" != "$PKG_VERSION" ]; then
            echo "step=tag" >> "$GITHUB_OUTPUT"

          # package.json matches npm but no tag → new version, start fresh
          elif [ "$PKG_VERSION" = "$NPM_VERSION" ] && \
               [ "$GIT_VERSION" != "$PKG_VERSION" ]; then
            echo "step=bump" >> "$GITHUB_OUTPUT"

          else
            echo "step=none" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

  # 3. Publish
  # Runs only when detect outputs a step other than none.
  # Each step is conditionally skipped based on where we're resuming from,
  # so the job always runs only the steps that are needed.
  #
  # Uses OIDC Trusted Publishing — no NPM_TOKEN needed.
  # Setup: npmjs.com → curlit → Settings → Trusted Publishers → GitHub Actions
  #   Owner: DaggieBlanqx | Repo: curlit | Workflow: npm-publish.yml
  #   Environment: Staging Environment
  publish:
    name: Publish package
    needs: detect
    if: needs.detect.outputs.step != 'none'
    runs-on: ubuntu-latest
    environment: Staging Environment
    permissions:
      contents: write # push version bump + create GitHub release
      id-token: write # OIDC token for npm trusted publishing
    env:
      RESUME_STEP: ${{ needs.detect.outputs.step }}
      VERSION: ${{ needs.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: ${{ env.REGISTRY_URL }}

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      # npm 11.5.1+ is required for OIDC trusted publishing
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Configure Git
        if: env.RESUME_STEP == 'bump' || env.RESUME_STEP == 'tag'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Step 1 — Bump package.json
      - name: Bump package.json
        if: env.RESUME_STEP == 'bump'
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: release v$NEW_VERSION [skip ci][no ci]"
          git push origin main
          echo "VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      # Step 2 — Create and push git tag
      - name: Create git tag
        if: env.RESUME_STEP == 'bump' || env.RESUME_STEP == 'tag'
        run: |
          if [ "$RESUME_STEP" = "tag" ]; then git pull origin main; fi
          git tag "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"

      # Step 3 — Create GitHub release
      - name: Generate release notes
        if: env.RESUME_STEP == 'bump' || env.RESUME_STEP == 'tag' || env.RESUME_STEP == 'release'
        id: notes
        run: |
          CURRENT_TAG="v$VERSION"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" -20 | grep -v "\[skip ci\]")
          else
            NOTES=$(git log "$PREV_TAG".."$CURRENT_TAG"^ --pretty=format:"- %s (%h)" | grep -v "\[skip ci\]")
          fi
          { echo "notes<<EOF"; echo "$NOTES"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: env.RESUME_STEP == 'bump' || env.RESUME_STEP == 'tag' || env.RESUME_STEP == 'release'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ env.VERSION }}`,
              name: `v${{ env.VERSION }}`,
              body: `## What's changed\n\n${{ steps.notes.outputs.notes }}\n\n---\n📦 [View on npm](https://www.npmjs.com/package/curlit/v/${{ env.VERSION }})`,
              draft: false,
              prerelease: false,
              generate_release_notes: false,
            });

      # Step 4 — Publish to npm (always last)
      - name: Publish to npm
        run: npm publish --access public
